<!doctype html>
<html lang="zh-Hans" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

    <title>jeekeagle — 个人作品集</title>
    <meta name="description" content="jeekeagle 的个人作品集：书籍、博客、画作、课程、工具与随笔。" />

    <meta property="og:title" content="jeekeagle — 个人作品集" />
    <meta property="og:description" content="书籍 · 博客 · 画作 · 课程 · 工具 · 随笔 — 一个不断生长的创作索引。" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <header class="topbar">
      <a href="#top" class="brand" aria-label="返回顶部">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <span class="brand-name">jeekeagle</span>
      </a>
      <nav class="topbar-nav">
        <a href="#categories">作品</a>
        <a href="#timeline">演进</a>
        <a href="#about">关于</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换明暗主题" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2" x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="5" y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/>
            <line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/>
            <line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/>
            <line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/>
          </g>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z" fill="currentColor"/>
        </svg>
      </button>
    </header>

    <main id="top" class="container">
      <!-- Hero + Status -->
      <section class="grid hero-grid">
        <article class="card card-hero" data-reveal>
          <p class="eyebrow" id="hero-eyebrow"></p>
          <h1 class="hero-title" id="hero-title"></h1>
          <p class="hero-tagline" id="hero-tagline"></p>
          <div class="hero-actions" id="hero-actions"></div>
        </article>

        <article class="card card-status" data-reveal>
          <div class="status-head">
            <span class="dot dot-pulse" aria-hidden="true"></span>
            <span class="status-label">Now</span>
          </div>
          <p class="status-text" id="status-text"></p>
          <p class="status-meta" id="status-meta"></p>
        </article>
      </section>

      <!-- Featured works -->
      <section class="grid featured-grid" id="featured"></section>

      <!-- Categories -->
      <section id="categories" class="section">
        <header class="section-head">
          <h2 class="section-title">作品分类</h2>
          <p class="section-sub">按类型索引。每件都是亲手做的东西。</p>
        </header>
        <div class="grid categories-grid" id="categories-grid"></div>
      </section>

      <!-- Timeline -->
      <section id="timeline" class="section">
        <header class="section-head">
          <h2 class="section-title">演进</h2>
          <p class="section-sub">从第一本书到课程筹备 — 一条缓慢但持续的轨迹。</p>
        </header>
        <ol class="timeline" id="timeline-list"></ol>
      </section>

      <!-- About -->
      <section id="about" class="section">
        <div class="grid about-grid">
          <article class="card card-about" data-reveal>
            <h2 class="card-title" id="about-title"></h2>
            <p class="card-body" id="about-body"></p>
            <ul class="about-meta" id="about-meta"></ul>
          </article>
          <article class="card card-contact" data-reveal>
            <h3 class="card-title-sm">联系</h3>
            <ul class="contact-list" id="contact-list"></ul>
          </article>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p class="footer-line">
        <span id="footer-copy"></span>
        <span class="footer-sep">·</span>
        <span id="footer-quote"></span>
      </p>
    </footer>
  </body>
</html>
